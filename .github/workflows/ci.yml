name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - apps/user_app
          - apps/admin_app
          - packages/shared_core
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.8.1'
          channel: stable

      - name: Install dependencies
        working-directory: ${{ matrix.package }}
        run: flutter pub get

      - name: Analyze
        working-directory: ${{ matrix.package }}
        run: flutter analyze

      - name: Test
        working-directory: ${{ matrix.package }}
        run: |
          if [ -d test ]; then
            flutter test
          else
            echo "No test directory, skipping."
          fi
